<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vaulta Cash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-green: #1a3c2a;
            --dark-green-light: #24543a;
            --dark-green-hover: #2d6b4a;
            --dark-green-bg: #e8f5ee;
            --dark-gold: #8b6914;
            --dark-gold-light: #a67c1a;
            --dark-gold-dark: #6b5010;
            --dark-gold-bg: #fdf6e3;
            --surface: #ffffff;
            --border: #d4ddd8;
            --text: #1a3c2a;
            --text-secondary: #4a6b58;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--dark-green) 0%, #0d261a 50%, var(--dark-green-light) 100%);
            padding: 20px;
        }
        .login-wrapper { width: 100%; max-width: 420px; }
        .login-card {
            width: 100%;
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, var(--dark-green) 0%, var(--dark-green-light) 100%);
            padding: 32px 32px 28px;
            text-align: center;
        }
        .login-header .logo-wrapper {
            width: 72px; height: 72px;
            background: rgba(255,255,255,0.12);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            backdrop-filter: blur(4px);
        }
        .login-header .logo-wrapper img {
            width: 48px; height: 48px; object-fit: contain;
        }
        .login-header h3 {
            color: #fff; font-weight: 700; margin: 0 0 4px;
            font-size: 20px; letter-spacing: -0.3px;
        }
        .login-header p {
            color: rgba(255,255,255,0.7); margin: 0; font-size: 13px;
        }
        .login-body { padding: 32px; }
        .login-body .form-label {
            font-size: 12px; font-weight: 600; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
        }
        .login-body .form-control {
            border: 2px solid var(--border); border-radius: 10px;
            padding: 12px 14px; font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .login-body .form-control:focus {
            border-color: var(--dark-gold);
            box-shadow: 0 0 0 3px rgba(139,105,20,0.15);
            outline: none;
        }
        .login-body .btn-signin {
            background: linear-gradient(135deg, var(--dark-gold) 0%, var(--dark-gold-light) 100%);
            border: none; border-radius: 10px; padding: 14px;
            font-size: 14px; font-weight: 600; color: #fff;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .login-body .btn-signin:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(139,105,20,0.35);
            color: #fff;
        }
        .login-body .btn-signin:active { transform: translateY(0); }
        .flash-message {
            background: var(--dark-green);
            color: #fff;
            border-radius: 10px;
            padding: 14px 20px;
            margin-bottom: 16px;
            text-align: center;
            font-weight: 500;
            font-size: 13px;
            position: relative;
        }
        .flash-message.success { background: var(--dark-green); }
        .flash-message.info { background: var(--dark-green); }
        .flash-message.danger { background: #991b1b; }
        .flash-message.warning { background: #92400e; }
        .flash-message .btn-close {
            position: absolute; top: 50%; right: 12px;
            transform: translateY(-50%);
            filter: invert(1);
            opacity: 0.7;
        }
        .flash-message .btn-close:hover { opacity: 1; }
    </style>
</head>
<body>
<div class="login-page">
    <div class="login-wrapper">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash-message {{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <div class="login-card">
            <div class="login-header">
                <div class="logo-wrapper">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="Vaulta">
                </div>
                <h3>Vaulta Cash</h3>
                <p>Loan Management System</p>
            </div>
            <div class="login-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-signin w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>
                <div class="text-center mt-4 pt-3" style="border-top:1px solid var(--border);">
                    <a href="{{ url_for('client_loan_access') }}" class="text-muted" style="font-size:13px;text-decoration:none;">
                        <i class="bi bi-eye me-1"></i>Client? View your loan here
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
